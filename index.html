<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }
        input {
            padding: 10px;
            width: 200px;
        }
        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }
        li {
            list-style: none;
            margin: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h2>📝 To-Do List</h2>

<input type="text" id="task" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>
function addTask() {
    let task = document.getElementById("task").value;

    if (task === "") {
        alert("Enter a task!");
        return;
    }

    let li = document.createElement("li");
    li.innerHTML = task + " <button onclick='this.parentElement.remove()'>❌</button>";

    document.getElementById("list").appendChild(li);
    document.getElementById("task").value = "";
}
</script>

</body>
</html>
